<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <title>FinanceFlow</title>
</head>
<body>
<header>
    <h1>FinanceFlow</h1>
</header>

<div class="layout">

    <aside>
        <nav>
            <ul>
                <li>Dashboard</li>
                <li>Transactions</li>
                <li>Budget</li>
            </ul>
        </nav>
    </aside>

    <main>
        <h2>Dashboard</h2>

        <div class="cards-grid">

            <div class="card">
                <p class="card__label">Total Income</p>
                <p class="card__amount card__amount--income">€2,450.00</p>
            </div>

            <div class="card">
                <p class="card__label">Total Expenses</p>
                <p class="card__amount card__amount--expenses">€1,280.00</p>
            </div>

            <div class="card">
                <p class="card__label">Balance</p>
                <p class="card__amount card__amount--balance">€1,170.00</p>
            </div>

        </div>
    </main>

</div>

<footer>
    <p>FinanceFlow 2026</p>
</footer>

</body>
</html>
